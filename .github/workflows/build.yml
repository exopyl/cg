name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # Tag of the cg_binaries Release this build consumes.
  CG_BINARIES_VERSION: v1.0.0

jobs:
  build:
    name: ci-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download cg_binaries archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .deps/cg_binaries
          cd .deps
          gh release download "$CG_BINARIES_VERSION" \
            --repo "${{ github.repository_owner }}/cg_binaries" \
            --pattern 'cgbinaries-*-linux-x86_64.zip'
          unzip -q cgbinaries-*-linux-x86_64.zip
          mv cgbinaries-*-linux-x86_64/* cg_binaries/
          rm -rf cgbinaries-*-linux-x86_64 cgbinaries-*-linux-x86_64.zip

      - name: Install Ninja + GTest
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtest-dev libgmock-dev

      - name: Configure
        run: cmake --preset ci-linux

      - name: Build
        run: cmake --build --preset ci-linux

      - name: Test
        run: ctest --preset ci-linux
